<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>じゃんけんゲーム</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .game-container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 600px;
      width: 90%;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .score-box {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 24px;
      min-width: 100px;
    }

    .score-box .label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.win .value { color: #4ade80; }
    .score-box.lose .value { color: #f87171; }
    .score-box.draw .value { color: #fbbf24; }

    .battle-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      min-height: 140px;
    }

    .hand-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .hand-display .hand-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hand-emoji {
      font-size: 5rem;
      line-height: 1;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .hand-emoji.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(-10deg); }
      50% { transform: translateY(5px) rotate(5deg); }
      75% { transform: translateY(-5px) rotate(-5deg); }
    }

    .vs-text {
      font-size: 1.5rem;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.3);
    }

    .result-text {
      font-size: 1.8rem;
      font-weight: bold;
      min-height: 44px;
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .result-text.win { color: #4ade80; }
    .result-text.lose { color: #f87171; }
    .result-text.draw { color: #fbbf24; }

    .choices {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .choice-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 0.85rem;
    }

    .choice-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-4px);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .choice-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .choice-btn .btn-emoji {
      font-size: 2.8rem;
    }

    .reset-btn {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      padding: 10px 28px;
      color: #e94560;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background: rgba(233, 69, 96, 0.35);
    }

    .history {
      margin-top: 24px;
      text-align: left;
    }

    .history-title {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    .history-item {
      font-size: 0.82rem;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
    }

    .history-item.win { border-left: 3px solid #4ade80; }
    .history-item.lose { border-left: 3px solid #f87171; }
    .history-item.draw { border-left: 3px solid #fbbf24; }

    /* ===== パンダ（2倍サイズ） ===== */
    .panda-wrapper {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      z-index: 100;
    }

    /* 吹き出し（2倍サイズ） */
    .speech-bubble {
      position: relative;
      background: #fff;
      color: #222;
      border-radius: 36px;
      padding: 20px 36px;
      font-size: 2.3rem;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      margin-bottom: 12px;
      opacity: 0;
      transform: scale(0.7) translateY(10px);
      transform-origin: bottom right;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .speech-bubble.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* 吹き出しのしっぽ（右下向き） */
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -26px;
      right: 56px;
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 28px solid #fff;
    }

    .bubble-text {
      display: inline-block;
      transition: opacity 0.2s ease;
    }
    .bubble-text.fade-out {
      opacity: 0;
    }

    /* パンダ本体（2倍サイズ） */
    .panda {
      position: relative;
      width: 200px;
      height: 200px;
      cursor: default;
      user-select: none;
    }

    .panda.bounce {
      animation: pandaBounce 0.6s ease-in-out infinite alternate;
    }

    @keyframes pandaBounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-16px); }
    }

    /* 胴体 */
    .panda-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 144px;
      height: 120px;
      background: #fff;
      border-radius: 50% 50% 45% 45%;
      border: 6px solid #222;
    }

    /* お腹の模様 */
    .panda-body::after {
      content: '';
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 44px;
      background: #333;
      border-radius: 50%;
    }

    /* 頭 */
    .panda-head {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 120px;
      background: #fff;
      border-radius: 50%;
      border: 6px solid #222;
      z-index: 2;
    }

    /* 耳（左） */
    .panda-ear-left {
      position: absolute;
      top: 0px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: #222;
      border-radius: 50%;
      z-index: 1;
    }

    /* 耳（右） */
    .panda-ear-right {
      position: absolute;
      top: 0px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: #222;
      border-radius: 50%;
      z-index: 1;
    }

    /* 目のくま（左） */
    .panda-eye-patch-left {
      position: absolute;
      top: 36px;
      left: 16px;
      width: 40px;
      height: 32px;
      background: #222;
      border-radius: 50%;
      z-index: 3;
    }

    /* 目のくま（右） */
    .panda-eye-patch-right {
      position: absolute;
      top: 36px;
      right: 16px;
      width: 40px;
      height: 32px;
      background: #222;
      border-radius: 50%;
      z-index: 3;
    }

    /* 目（左） */
    .panda-eye-left {
      position: absolute;
      top: 42px;
      left: 28px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      z-index: 4;
    }

    /* 目（右） */
    .panda-eye-right {
      position: absolute;
      top: 42px;
      right: 28px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      z-index: 4;
    }

    /* 瞳（左） */
    .panda-eye-left::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
    }

    /* 瞳（右） */
    .panda-eye-right::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
    }

    /* 鼻 */
    .panda-nose {
      position: absolute;
      top: 74px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 12px;
      background: #333;
      border-radius: 50%;
      z-index: 4;
    }

    /* 口 */
    .panda-mouth {
      position: absolute;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 18px;
      border-bottom: 6px solid #333;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-radius: 0 0 50% 50%;
      z-index: 4;
    }

    /* 腕（左） */
    .panda-arm-left {
      position: absolute;
      bottom: 28px;
      left: 8px;
      width: 36px;
      height: 64px;
      background: #222;
      border-radius: 50% 30% 40% 50%;
      transform: rotate(15deg);
      z-index: 1;
    }

    /* 腕（右） */
    .panda-arm-right {
      position: absolute;
      bottom: 28px;
      right: 8px;
      width: 36px;
      height: 64px;
      background: #222;
      border-radius: 30% 50% 50% 40%;
      transform: rotate(-15deg);
      z-index: 1;
    }

    /* 足（左） */
    .panda-leg-left {
      position: absolute;
      bottom: -20px;
      left: 28px;
      width: 40px;
      height: 48px;
      background: #222;
      border-radius: 40% 40% 50% 50%;
    }

    /* 足（右） */
    .panda-leg-right {
      position: absolute;
      bottom: -20px;
      right: 28px;
      width: 40px;
      height: 48px;
      background: #222;
      border-radius: 40% 40% 50% 50%;
    }

    /* ポイ！・あいこ・負け：目がキラキラ（黄色に光る） */
    .panda.excited .panda-eye-left,
    .panda.excited .panda-eye-right {
      background: #ffe066;
      transition: background 0.3s ease;
    }

    .panda.excited .panda-mouth {
      border-bottom-color: #e94560;
      width: 48px;
      top: 86px;
    }

    /* 勝ち：目がハート */
    .panda.heart-eyes .panda-eye-left,
    .panda.heart-eyes .panda-eye-right {
      background: #ffb3c1;
      overflow: hidden;
    }

    .panda.heart-eyes .panda-eye-left::after,
    .panda.heart-eyes .panda-eye-right::after {
      content: '❤';
      background: transparent;
      border-radius: 0;
      color: #e94560;
      font-size: 13px;
      width: 16px;
      height: 16px;
      top: 0;
      left: 0;
      line-height: 16px;
      text-align: center;
    }

    .panda.heart-eyes .panda-mouth {
      border-bottom-color: #e94560;
      width: 48px;
      top: 86px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>✊ じゃんけんゲーム</h1>
    <p class="subtitle">グー・チョキ・パーを選んでね！</p>

    <div class="scoreboard">
      <div class="score-box win">
        <div class="label">勝ち</div>
        <div class="value" id="win-count">0</div>
      </div>
      <div class="score-box draw">
        <div class="label">あいこ</div>
        <div class="value" id="draw-count">0</div>
      </div>
      <div class="score-box lose">
        <div class="label">負け</div>
        <div class="value" id="lose-count">0</div>
      </div>
    </div>

    <div class="battle-area">
      <div class="hand-display">
        <span class="hand-label">あなた</span>
        <span class="hand-emoji" id="player-hand">🤜</span>
      </div>
      <div class="vs-text">VS</div>
      <div class="hand-display">
        <span class="hand-label">コンピュータ</span>
        <span class="hand-emoji" id="cpu-hand">🤛</span>
      </div>
    </div>

    <div class="result-text" id="result-text">手を選んでスタート！</div>

    <div class="choices">
      <button class="choice-btn" id="btn-rock" onclick="play('rock')">
        <span class="btn-emoji">✊</span>
        グー
      </button>
      <button class="choice-btn" id="btn-scissors" onclick="play('scissors')">
        <span class="btn-emoji">✌️</span>
        チョキ
      </button>
      <button class="choice-btn" id="btn-paper" onclick="play('paper')">
        <span class="btn-emoji">🖐️</span>
        パー
      </button>
    </div>

    <button class="reset-btn" onclick="resetGame()">リセット</button>

    <div class="history">
      <div class="history-title">履歴</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <!-- パンダキャラクター -->
  <div class="panda-wrapper">
    <div class="speech-bubble" id="speech-bubble">
      <span class="bubble-text" id="bubble-text">じゃんけん～</span>
    </div>
    <div class="panda" id="panda">
      <div class="panda-ear-left"></div>
      <div class="panda-ear-right"></div>
      <div class="panda-head">
        <div class="panda-eye-patch-left"></div>
        <div class="panda-eye-patch-right"></div>
        <div class="panda-eye-left"></div>
        <div class="panda-eye-right"></div>
        <div class="panda-nose"></div>
        <div class="panda-mouth"></div>
      </div>
      <div class="panda-body">
        <div class="panda-arm-left"></div>
        <div class="panda-arm-right"></div>
        <div class="panda-leg-left"></div>
        <div class="panda-leg-right"></div>
      </div>
    </div>
  </div>

  <script>
    const HANDS = {
      rock:     { emoji: '✊', label: 'グー' },
      scissors: { emoji: '✌️', label: 'チョキ' },
      paper:    { emoji: '🖐️', label: 'パー' },
    };

    const WINS_AGAINST = {
      rock: 'scissors',
      scissors: 'paper',
      paper: 'rock',
    };

    let score = { win: 0, draw: 0, lose: 0 };
    let history = [];
    let isPlaying = false;

    function getRandomHand() {
      const keys = Object.keys(HANDS);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function getResult(player, cpu) {
      if (player === cpu) return 'draw';
      if (WINS_AGAINST[player] === cpu) return 'win';
      return 'lose';
    }

    function setButtonsDisabled(disabled) {
      ['btn-rock', 'btn-scissors', 'btn-paper'].forEach(id => {
        document.getElementById(id).disabled = disabled;
      });
    }

    function showBubble(text) {
      const textEl = document.getElementById('bubble-text');
      textEl.textContent = text;
      textEl.classList.remove('fade-out');
      document.getElementById('speech-bubble').classList.add('visible');
    }

    function changeBubbleText(text, callback) {
      const textEl = document.getElementById('bubble-text');
      textEl.classList.add('fade-out');
      setTimeout(() => {
        textEl.textContent = text;
        textEl.classList.remove('fade-out');
        if (callback) callback();
      }, 220);
    }

    function hideBubble() {
      document.getElementById('speech-bubble').classList.remove('visible');
    }

    function play(playerChoice) {
      if (isPlaying) return;
      isPlaying = true;
      setButtonsDisabled(true);

      const cpuChoice = getRandomHand();
      const result = getResult(playerChoice, cpuChoice);

      const panda = document.getElementById('panda');
      panda.classList.remove('excited', 'heart-eyes');
      panda.classList.add('bounce');
      showBubble('じゃんけん～');

      // 3秒後：「ポイ！」＋同時に結果を表示
      setTimeout(() => {
        changeBubbleText('ポイ！', () => {
          // 目の演出：「ポイ！」の間は全結果ともキラキラ
          panda.classList.add('excited');

          // 手を公開してアニメーション
          const playerEl = document.getElementById('player-hand');
          const cpuEl = document.getElementById('cpu-hand');
          playerEl.textContent = HANDS[playerChoice].emoji;
          cpuEl.textContent = HANDS[cpuChoice].emoji;
          playerEl.classList.remove('shake');
          cpuEl.classList.remove('shake');
          void playerEl.offsetWidth;
          void cpuEl.offsetWidth;
          playerEl.classList.add('shake');
          cpuEl.classList.add('shake');

          // スコア更新
          score[result]++;
          document.getElementById('win-count').textContent = score.win;
          document.getElementById('draw-count').textContent = score.draw;
          document.getElementById('lose-count').textContent = score.lose;

          // 結果テキスト表示
          const resultEl = document.getElementById('result-text');
          resultEl.className = 'result-text ' + result;
          const messages = { win: '🎉 あなたの勝ち！', draw: '🤝 あいこ！', lose: '😢 コンピュータの勝ち…' };
          resultEl.textContent = messages[result];

          // 履歴追加
          const round = history.length + 1;
          const item = `第${round}回：あなた ${HANDS[playerChoice].label} vs CPU ${HANDS[cpuChoice].label} → ${result === 'win' ? '勝ち' : result === 'draw' ? 'あいこ' : '負け'}`;
          history.unshift({ text: item, result });
          const listEl = document.getElementById('history-list');
          const div = document.createElement('div');
          div.className = 'history-item ' + result;
          div.textContent = item;
          listEl.prepend(div);
        });
      }, 3000);

      // 4秒後：パンダのセリフを結果メッセージに変更（3秒間表示）＋勝ちならハート目に切り替え
      setTimeout(() => {
        const pandaMsgs = { win: 'おめでとう！', draw: 'あら～', lose: '残念！' };
        changeBubbleText(pandaMsgs[result], () => {
          if (result === 'win') {
            panda.classList.remove('excited');
            panda.classList.add('heart-eyes');
          }
        });
      }, 4000);

      // 7秒後：吹き出し非表示・ボタン再有効化
      setTimeout(() => {
        hideBubble();
        panda.classList.remove('bounce', 'excited', 'heart-eyes');
        setButtonsDisabled(false);
        isPlaying = false;
      }, 7000);
    }

    function resetGame() {
      score = { win: 0, draw: 0, lose: 0 };
      history = [];
      isPlaying = false;
      document.getElementById('win-count').textContent = '0';
      document.getElementById('draw-count').textContent = '0';
      document.getElementById('lose-count').textContent = '0';
      document.getElementById('player-hand').textContent = '🤜';
      document.getElementById('cpu-hand').textContent = '🤛';
      const resultEl = document.getElementById('result-text');
      resultEl.className = 'result-text';
      resultEl.textContent = '手を選んでスタート！';
      document.getElementById('history-list').innerHTML = '';
      hideBubble();
      const panda = document.getElementById('panda');
      panda.classList.remove('bounce', 'excited', 'heart-eyes');
      setButtonsDisabled(false);
    }
  </script>
</body>
</html>

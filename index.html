<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲームひろば</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 640px;
      width: 90%;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .game-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .game-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s ease;
      text-align: left;
    }

    .game-card:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-3px);
    }

    .game-icon {
      font-size: 2.8rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .game-info {
      flex: 1;
    }

    .game-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .game-desc {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .game-arrow {
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 ゲームひろば</h1>
    <p class="subtitle">遊びたいゲームを選んでね！</p>

    <div class="game-list">
      <a class="game-card" href="janken.html">
        <div class="game-icon">✊</div>
        <div class="game-info">
          <div class="game-title">じゃんけんゲーム</div>
          <div class="game-desc">グー・チョキ・パーでコンピュータと対戦！</div>
        </div>
        <div class="game-arrow">›</div>
      </a>
      <a class="game-card" href="shooting-2.html">
        <div class="game-icon">🐱</div>
        <div class="game-info">
          <div class="game-title">シューティングゲーム</div>
          <div class="game-desc">ウサギをハートで倒せ！12匹たおしたらクリア！</div>
        </div>
        <div class="game-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
